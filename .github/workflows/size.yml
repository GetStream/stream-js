name: Compressed Size

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'test/**'
      - '**.md'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: preactjs/compressed-size-action@v2
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
        with:
          repo-token: '${{ secrets.GITHUB_TOKEN }}'
          build-script: 'dist'
