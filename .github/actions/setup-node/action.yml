name: Setup
description: Sets up Node and Build SDK

inputs:
  node-version:
    required: false
    default: '24'
  skip-puppeteer:
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        registry-url: 'https://registry.npmjs.org'
        cache: 'yarn'

    - name: Install Dependencies
      run: yarn install --immutable
      shell: bash
      env:
        PUPPETEER_SKIP_DOWNLOAD: ${{ inputs.skip-puppeteer }}
